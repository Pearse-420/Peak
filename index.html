<!DOCTYPE html>
<html>

<head>
<title>LEGENDARY PEAK COUNTDOWN</title>

<style>

/* ========== BODY ========== */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;

background:black;
position:relative;
}

/* Starfield background */
.stars{
position:fixed;
width:2px;
height:2px;
background:white;
box-shadow:0 0 white;
animation:twinkle 5s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* Dark space gradient */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(0,0,0,0.2),black 80%);
z-index:0;
}

/* Container */
.container{
position:relative;
z-index:2;
text-align:center;
animation:fadeUp 1.5s ease;
}

/* Title */
h1{
font-size:70px;
text-shadow:
0 0 20px #b300ff,
0 0 60px #8000ff,
0 0 120px #e6a3ff;
}

/* Timer cubes */
.timer{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
perspective:1400px;
}

.block{
background:linear-gradient(145deg,#12001a,#000);
padding:30px;
border-radius:22px;
min-width:150px;

box-shadow:
0 0 40px #8000ff,
0 0 100px rgba(179,0,255,0.8);

border:1px solid rgba(255,255,255,0.1);

transition:0.5s;
transform-style:preserve-3d;
}

.block:hover{
transform:rotateX(18deg) rotateY(18deg) scale(1.1);
}

.number{
font-size:60px;
font-weight:bold;
color:#e6a3ff;
text-shadow:0 0 25px #b300ff;
animation:flipNum .6s ease;
}

.label{
opacity:0.8;
}

/* Flip animation */
@keyframes flipNum{
from{
transform:rotateX(90deg);
opacity:0;
}
to{
transform:rotateX(0);
opacity:1;
}
}

/* Progress bar */
.progress-container{
margin-top:45px;
width:80%;
height:18px;
background:rgba(255,255,255,0.1);
border-radius:40px;
overflow:hidden;

box-shadow:
0 0 40px #8000ff,
0 0 80px #b300ff;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#8000ff,#b300ff,#e6a3ff);
box-shadow:0 0 80px #b300ff;
transition:0.7s;
}

/* Reveal screen */
#revealScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.97);
backdrop-filter:blur(35px);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
cursor:pointer;
}

#revealText{
font-size:70px;
letter-spacing:8px;
color:#e6a3ff;
text-shadow:0 0 50px #b300ff;
}

/* Volume */
#volumeControl{
margin-top:30px;
width:240px;
}

/* Animations */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(60px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Screen shake (bass effect) */
.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-4px,4px);}
50%{transform:translate(4px,-4px);}
75%{transform:translate(-4px,-4px);}
100%{transform:translate(0,0);}
}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div id="revealScreen">
<div id="revealText">CLICK TO REVEAL</div>
</div>

<div class="container">

<h1>TIME LEFT UNTIL PEAK</h1>

<div class="timer">
<div class="block"><div class="number" id="months"></div><div class="label">MONTHS</div></div>
<div class="block"><div class="number" id="weeks"></div><div class="label">WEEKS</div></div>
<div class="block"><div class="number" id="days"></div><div class="label">DAYS</div></div>
<div class="block"><div class="number" id="hours"></div><div class="label">HOURS</div></div>
<div class="block"><div class="number" id="minutes"></div><div class="label">MINUTES</div></div>
<div class="block"><div class="number" id="seconds"></div><div class="label">SECONDS</div></div>
</div>

<div class="progress-container">
<div class="progress" id="progressBar"></div>
</div>

<input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.5">

</div>

<script>

/* Reveal + music fade */
document.getElementById("revealScreen").addEventListener("click",function(){

this.style.display="none";

const music=document.getElementById("bgMusic");
music.volume=0;
music.play();

let v=0;
let fade=setInterval(()=>{
if(v<0.7){
v+=0.03;
music.volume=v;
}
else clearInterval(fade);
},70);

});

/* Volume */
document.getElementById("volumeControl").addEventListener("input",function(){
document.getElementById("bgMusic").volume=this.value;
});

/* Countdown */
var startDate=new Date("January 1, 2026").getTime();
var targetDate=new Date("May 18, 2026 00:00:00").getTime();

setInterval(function(){

var now=new Date().getTime();
var distance=targetDate-now;

var seconds=Math.floor((distance/1000)%60);
var minutes=Math.floor((distance/1000/60)%60);
var hours=Math.floor((distance/(1000*60*60))%24);
var days=Math.floor((distance/(1000*60*60*24))%7);
var weeks=Math.floor((distance/(1000*60*60*24*7))%4);
var months=Math.floor((distance/(1000*60*60*24*30)));

function animateNumber(id,value){
let el=document.getElementById(id);
if(el.innerHTML!=value){
el.innerHTML=value;
el.style.animation="none";
void el.offsetWidth;
el.style.animation="flipNum .6s ease";
}
}

animateNumber("months",months);
animateNumber("weeks",weeks);
animateNumber("days",days);
animateNumber("hours",hours);
animateNumber("minutes",minutes);
animateNumber("seconds",seconds);

/* Progress */
var total=targetDate-startDate;
var passed=now-startDate;
var percent=(passed/total)*100;

document.getElementById("progressBar").style.width=percent+"%";

/* Legendary effect */
if(percent>80){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
}

},1000);

</script>

</body>
</html>
