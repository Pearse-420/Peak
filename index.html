<!DOCTYPE html>
<html>

<head>
<title>Countdown until peak</title>

<style>

/* ================= BODY BACKGROUND ================= */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;

background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
position:relative;
}

/* Container */

.container{
text-align:center;
z-index:2;
}

/* Title */

h1{
font-size:70px;
text-shadow:
0 0 30px #b300ff,
0 0 80px #8000ff,
0 0 150px #e6a3ff;
}

/* ================= TIMER ================= */

.timer{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.block{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
padding:30px;
border-radius:22px;
min-width:150px;

box-shadow:
0 0 40px #8000ff,
0 0 90px rgba(179,0,255,0.7);

border:1px solid rgba(255,255,255,0.1);
}

.number{
font-size:60px;
font-weight:bold;
color:#e6a3ff;
text-shadow:0 0 30px #b300ff;
}

.label{
opacity:0.8;
}

/* ================= PROGRESS BAR ================= */

.progress-container{
margin-top:45px;
width:80%;
height:18px;
background:rgba(255,255,255,0.2);
border-radius:40px;
overflow:hidden;
margin:auto;

box-shadow:
0 0 40px #8000ff,
0 0 80px #b300ff;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#8000ff,#b300ff,#e6a3ff);
box-shadow:0 0 80px #b300ff;
transition:0.6s;
}

/* ================= REVEAL SCREEN ================= */

#revealScreen{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);

display:flex;
justify-content:center;
align-items:center;

z-index:999;
cursor:pointer;
}

#revealText{
font-size:70px;
letter-spacing:6px;
color:#e6a3ff;
text-shadow:0 0 50px #b300ff;
}

/* ================= VOLUME ================= */

#volumeControl{
margin-top:30px;
width:240px;
}

</style>

</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="song1.mp3" type="audio/mp3">
</audio>

<!-- REVEAL SCREEN -->
<div id="revealScreen">
<div id="revealText">CLICK TO REVEAL</div>
</div>

<div class="container">

<h1>TIME LEFT UNTIL PEAK</h1>

<div class="timer">

<div class="block">
<div class="number" id="months"></div>
<div class="label">MONTHS</div>
</div>

<div class="block">
<div class="number" id="weeks"></div>
<div class="label">WEEKS</div>
</div>

<div class="block">
<div class="number" id="days"></div>
<div class="label">DAYS</div>
</div>

<div class="block">
<div class="number" id="hours"></div>
<div class="label">HOURS</div>
</div>

<div class="block">
<div class="number" id="minutes"></div>
<div class="label">MINUTES</div>
</div>

<div class="block">
<div class="number" id="seconds"></div>
<div class="label">SECONDS</div>
</div>

</div>

<div class="progress-container">
<div class="progress" id="progressBar"></div>
</div>

<input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.5">

</div>

<script>

/* ================= REVEAL + MUSIC ================= */

document.getElementById("revealScreen").addEventListener("click",function(){

this.style.display="none";

const music=document.getElementById("bgMusic");

music.volume=0;
music.play();

let v=0;
let fade=setInterval(()=>{
if(v<0.6){
v+=0.03;
music.volume=v;
}else clearInterval(fade);
},70);

});

/* ================= VOLUME ================= */

document.getElementById("volumeControl").addEventListener("input",function(){
document.getElementById("bgMusic").volume=this.value;
});

/* ================= COUNTDOWN ================= */

var startDate=new Date("January 1, 2026").getTime();
var targetDate=new Date("May 18, 2026 00:00:00").getTime();

setInterval(()=>{

var now=new Date().getTime();
var distance=targetDate-now;

var seconds=Math.floor((distance/1000)%60);
var minutes=Math.floor((distance/1000/60)%60);
var hours=Math.floor((distance/(1000*60*60))%24);
var days=Math.floor((distance/(1000*60*60*24))%7);
var weeks=Math.floor((distance/(1000*60*60*24*7))%4);
var months=Math.floor((distance/(1000*60*60*24*30)));

document.getElementById("months").innerHTML=months;
document.getElementById("weeks").innerHTML=weeks;
document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

var total=targetDate-startDate;
var passed=now-startDate;
var percent=(passed/total)*100;

document.getElementById("progressBar").style.width=percent+"%";

},1000);

</script>

</body>
</html>
