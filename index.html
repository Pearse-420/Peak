<!DOCTYPE html>
<html>
<head>

<title>Time left until PEAK</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:white;
text-align:center;

background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* dark overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

.container{
position:relative;
z-index:1;
}

h1{
font-size:50px;
margin-bottom:20px;
}

#countdown{
font-size:45px;
letter-spacing:2px;
}

</style>

</head>

<body>

<div class="container">
<h1>Time left until PEAK</h1>
<div id="countdown"></div>
</div>

<script>

var targetDate = new Date("May 18, 2026 00:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = targetDate - now;

var seconds = Math.floor((distance/1000)%60);
var minutes = Math.floor((distance/1000/60)%60);
var hours = Math.floor((distance/(1000*60*60))%24);
var days = Math.floor((distance/(1000*60*60*24))%7);
var weeks = Math.floor((distance/(1000*60*60*24*7))%4);
var months = Math.floor((distance/(1000*60*60*24*30)));

document.getElementById("countdown").innerHTML =
months + " months " +
weeks + " weeks " +
days + " days " +
hours + " hours " +
minutes + " minutes " +
seconds + " seconds";

},1000);

</script>

</body>
</html>
